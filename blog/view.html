<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post | Francesco Wang</title>
  <link rel="shortcut icon" href="../assets/images/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="post-page">

  <main class="post-shell">
    <article class="post-article active">

      <a href="../index.html#blog" class="text-link post-back-link">Back to portfolio blog</a>

      <header class="post-header">
        <p class="post-kicker" id="post-category"></p>
        <h1 class="post-title" id="post-title"></h1>

        <div class="post-meta">
          <time id="post-date"></time>
          <span id="post-reading-time"></span>
        </div>
      </header>

      <section class="post-content" id="post-content">
        <p>Loading...</p>
      </section>

    </article>
  </main>

  <script>
    'use strict';

    const escapeHtml = function (value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    };

    const renderInlineMarkdown = function (line) {
      return escapeHtml(line)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    };

    const markdownToHtml = function (markdown) {
      const lines = markdown.split('\n');
      let html = '';
      let inCodeBlock = false;
      let inUnorderedList = false;
      let inOrderedList = false;

      const closeLists = function () {
        if (inUnorderedList) {
          html += '</ul>';
          inUnorderedList = false;
        }
        if (inOrderedList) {
          html += '</ol>';
          inOrderedList = false;
        }
      };

      for (const rawLine of lines) {
        const line = rawLine.trim();

        if (line.startsWith('```')) {
          closeLists();
          if (!inCodeBlock) {
            html += '<pre><code>';
            inCodeBlock = true;
          } else {
            html += '</code></pre>';
            inCodeBlock = false;
          }
          continue;
        }

        if (inCodeBlock) {
          html += `${escapeHtml(rawLine)}\n`;
          continue;
        }

        if (!line) {
          closeLists();
          continue;
        }

        if (line.startsWith('# ')) {
          closeLists();
          html += `<h1>${renderInlineMarkdown(line.slice(2))}</h1>`;
          continue;
        }

        if (line.startsWith('## ')) {
          closeLists();
          html += `<h2>${renderInlineMarkdown(line.slice(3))}</h2>`;
          continue;
        }

        if (line.startsWith('### ')) {
          closeLists();
          html += `<h3>${renderInlineMarkdown(line.slice(4))}</h3>`;
          continue;
        }

        const orderedMatch = line.match(/^\d+\.\s+(.*)$/);
        if (orderedMatch) {
          if (!inOrderedList) {
            closeLists();
            html += '<ol>';
            inOrderedList = true;
          }
          html += `<li>${renderInlineMarkdown(orderedMatch[1])}</li>`;
          continue;
        }

        if (line.startsWith('- ')) {
          if (!inUnorderedList) {
            closeLists();
            html += '<ul>';
            inUnorderedList = true;
          }
          html += `<li>${renderInlineMarkdown(line.slice(2))}</li>`;
          continue;
        }

        if (line.startsWith('> ')) {
          closeLists();
          html += `<blockquote><p>${renderInlineMarkdown(line.slice(2))}</p></blockquote>`;
          continue;
        }

        closeLists();
        html += `<p>${renderInlineMarkdown(line)}</p>`;
      }

      closeLists();
      return html;
    };

    // get post slug from URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const postSlug = urlParams.get('post');

    if (!postSlug) {
      document.getElementById('post-content').innerHTML = '<p>No post specified.</p>';
    } else {
      // fetch blog metadata
      fetch('../assets/data/blog-posts.json', { cache: 'no-store' })
        .then(response => {
          if (!response.ok) {
            throw new Error('Failed to load metadata');
          }
          return response.json();
        })
        .then(data => {
          const post = data.posts.find(p => p.slug === postSlug);
          
          if (!post) {
            document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
            return;
          }

          // set metadata
          document.title = `${post.title} | Francesco Wang`;
          document.getElementById('post-category').textContent = post.category;
          document.getElementById('post-title').textContent = post.title;
          document.getElementById('post-date').textContent = new Date(post.date).toLocaleDateString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: 'numeric'
          });

          // fetch markdown content
          fetch(`../blog/posts/${postSlug}.md`, { cache: 'no-store' })
            .then(response => {
              if (!response.ok) {
                throw new Error('Failed to load markdown content');
              }
              return response.text();
            })
            .then(markdown => {
              const html = markdownToHtml(markdown);
              document.getElementById('post-content').innerHTML = html;
              
              // estimate reading time
              const wordCount = markdown.split(/\s+/).length;
              const readingTime = Math.ceil(wordCount / 200);
              document.getElementById('post-reading-time').textContent = `${readingTime} min read`;
            })
            .catch(error => {
              console.error('Error loading post content:', error);
              document.getElementById('post-content').innerHTML = '<p>Error loading post content.</p>';
            });
        })
        .catch(error => {
          console.error('Error loading blog metadata:', error);
          document.getElementById('post-content').innerHTML = '<p>Error loading post metadata.</p>';
        });
    }
  </script>

</body>

</html>
