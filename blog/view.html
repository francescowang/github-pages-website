<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post | Francesco Wang</title>
  <link rel="shortcut icon" href="../assets/images/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="../assets/js/vendor/marked.min.js"></script>
</head>

<body class="post-page">

  <main class="post-shell">
    <article class="post-article active">

      <a href="../index.html#blog" class="text-link post-back-link">Back to portfolio blog</a>

      <header class="post-header">
        <p class="post-kicker" id="post-category"></p>
        <h1 class="post-title" id="post-title"></h1>

        <div class="post-meta">
          <time id="post-date"></time>
          <span id="post-reading-time"></span>
        </div>
      </header>

      <section class="post-content" id="post-content">
        <p>Loading...</p>
      </section>

    </article>
  </main>

  <script>
    'use strict';

    // get post slug from URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const postSlug = urlParams.get('post');

    if (!postSlug) {
      document.getElementById('post-content').innerHTML = '<p>No post specified.</p>';
    } else {
      // fetch blog metadata
      fetch('../assets/data/blog-posts.json', { cache: 'no-store' })
        .then(response => {
          if (!response.ok) {
            throw new Error('Failed to load metadata');
          }
          return response.json();
        })
        .then(data => {
          const post = data.posts.find(p => p.slug === postSlug);
          
          if (!post) {
            document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
            return;
          }

          // set metadata
          document.title = `${post.title} | Francesco Wang`;
          document.getElementById('post-category').textContent = post.category;
          document.getElementById('post-title').textContent = post.title;
          document.getElementById('post-date').textContent = new Date(post.date).toLocaleDateString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: 'numeric'
          });

          // fetch markdown content
          fetch(`../blog/posts/${postSlug}.md`, { cache: 'no-store' })
            .then(response => {
              if (!response.ok) {
                throw new Error('Failed to load markdown content');
              }
              return response.text();
            })
            .then(markdown => {
              const html = marked.parse(markdown);
              document.getElementById('post-content').innerHTML = html;
              
              // estimate reading time
              const wordCount = markdown.split(/\s+/).length;
              const readingTime = Math.ceil(wordCount / 200);
              document.getElementById('post-reading-time').textContent = `${readingTime} min read`;
            })
            .catch(error => {
              console.error('Error loading post content:', error);
              document.getElementById('post-content').innerHTML = '<p>Error loading post content.</p>';
            });
        })
        .catch(error => {
          console.error('Error loading blog metadata:', error);
          document.getElementById('post-content').innerHTML = '<p>Error loading post metadata.</p>';
        });
    }
  </script>

</body>

</html>
